# deploy/nginx.conf — Nginx reverse proxy for Agent Maestro
#
# Features:
#   - Proxies all traffic to the maestro-server Express app
#   - WebSocket upgrade headers applied globally (covers /ws and /pty)
#   - Long proxy_read_timeout for persistent terminal (xterm/PTY) connections
#   - Ready for TLS via certbot (see comment block at bottom)
#
# Placeholders (filled in by deploy.sh):
#   %%APP_PORT%%     — Port maestro-server listens on (e.g. 4570)
#   %%SERVER_NAME%%  — FQDN or _ for catch-all (e.g. maestro.example.com)
#
# To install manually:
#   cp nginx.conf /etc/nginx/sites-available/maestro-server
#   ln -sf /etc/nginx/sites-available/maestro-server /etc/nginx/sites-enabled/
#   rm -f /etc/nginx/sites-enabled/default
#   nginx -t && systemctl reload nginx

server {
    listen 80;
    listen [::]:80;
    server_name %%SERVER_NAME%%;

    # --- Proxy timeouts ---
    # proxy_read_timeout must be high for persistent PTY WebSocket connections
    # (terminals stay open for the duration of a Claude session — potentially hours)
    proxy_connect_timeout  60s;
    proxy_send_timeout     3600s;
    proxy_read_timeout     3600s;
    send_timeout           3600s;

    # --- WebSocket upgrade (applied to all locations) ---
    # Both /ws (event bridge) and /pty (terminal) use WebSocket on the same HTTP port;
    # path routing is handled inside Express. Applying upgrade headers globally ensures
    # both paths upgrade correctly without separate location blocks.
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";

    # --- Standard proxy headers ---
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_cache_bypass                 $http_upgrade;

    # --- Main proxy ---
    location / {
        proxy_pass http://127.0.0.1:%%APP_PORT%%;

        # Disable nginx buffering for streaming responses (SSE, chunked)
        proxy_buffering off;
    }

    # --- Static asset caching (optional performance improvement) ---
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        proxy_pass http://127.0.0.1:%%APP_PORT%%;
        proxy_buffering on;
        proxy_cache_valid 200 1d;
        add_header Cache-Control "public, max-age=86400";
    }

    # =====================================================================
    # TLS / HTTPS via certbot
    # =====================================================================
    # To enable HTTPS, run:
    #   certbot --nginx -d %%SERVER_NAME%%
    #
    # This rewrites this file to add a :443 listener and HTTP→HTTPS redirect.
    # Auth over plain HTTP sends the password in cleartext — enable TLS now.
    #
    # Prerequisites:
    #   apt-get install -y certbot python3-certbot-nginx
    #   certbot --nginx -d your-domain.com
    #   # Auto-renewal (usually pre-installed via snap or cron):
    #   systemctl status certbot.timer
    # =====================================================================
}
